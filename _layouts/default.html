<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page.title | default: site.title | default: "DAFx Material" }}</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">

  <style>
    :root {
      --page-bg: #eef2f3;
      --text: #1f2937;
      --muted: #4b5563;
      --card-bg: #ffffff;
      --border: #d9dee5;
      --link: #1d4f8c;
      --link-hover: #163e6d;
      --max-width: 860px;
      --radius: 14px;
      --shadow: 0 12px 36px rgba(16, 24, 40, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      font-family: "IBM Plex Sans", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 10% 0%, #dce7f0 0%, transparent 35%),
        radial-gradient(circle at 100% 100%, #e8efe5 0%, transparent 40%),
        var(--page-bg);
      line-height: 1.72;
      padding: 2rem 1rem 3rem;
    }

    main.page {
      width: min(100%, var(--max-width));
      margin: 0 auto;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: clamp(1.2rem, 2.4vw, 2.3rem);
    }

    h1,
    h2,
    h3,
    h4 {
      font-family: "Source Serif 4", Georgia, serif;
      color: #111827;
      line-height: 1.25;
      margin-top: 1.45em;
      margin-bottom: 0.5em;
    }

    h1 {
      margin-top: 0;
      font-size: clamp(1.7rem, 2.3vw, 2.25rem);
      letter-spacing: -0.012em;
    }

    h2 {
      font-size: clamp(1.35rem, 1.65vw, 1.6rem);
      padding-top: 0.3rem;
      border-top: 1px solid #e5e7eb;
    }

    h3 {
      font-size: clamp(1.12rem, 1.3vw, 1.26rem);
      color: var(--muted);
      font-weight: 600;
    }

    p,
    li,
    blockquote {
      font-size: clamp(1.01rem, 1.05vw, 1.06rem);
    }

    p,
    ul,
    ol,
    blockquote {
      margin: 0.8rem 0 1rem;
    }

    ul,
    ol {
      padding-left: 1.3rem;
    }

    a {
      color: var(--link);
      text-decoration-thickness: 0.08em;
      text-underline-offset: 0.12em;
    }

    a:hover {
      color: var(--link-hover);
    }

    blockquote {
      margin-left: 0;
      padding: 0.85rem 1rem;
      border-left: 4px solid #9db7d8;
      background: #f7fafc;
      border-radius: 0 8px 8px 0;
    }

    hr {
      border: none;
      border-top: 1px solid #e5e7eb;
      margin: 1.35rem 0;
    }

    img,
    audio,
    video,
    iframe {
      max-width: 100%;
      height: auto;
      display: block;
      margin: 1rem auto;
    }

    code,
    pre {
      font-family: "Cascadia Code", Consolas, monospace;
    }

    @media (max-width: 640px) {
      body {
        padding: 0.8rem 0.55rem 1.2rem;
      }

      main.page {
        border-radius: 10px;
        padding: 1rem;
      }
    }
  </style>

<!-- MathJax -->
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$']] }
    };
  </script>

  <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
</head>

<body>
  <main class="page">
    {{ content }}
  </main>
</body>
</html>
